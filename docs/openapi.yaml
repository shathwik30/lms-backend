        streak_summary:
          type: object
          readOnly: true
          description: Current/longest streak plus a 7-day activity window for charting.
          properties:
            current:
              type: integer
            longest:
              type: integer
            status:
              type: string
              enum: [healthy, at_risk, broken]
            last_7_days:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  is_active:
                    type: boolean
        engagement_status:
          type: object
          readOnly: true
          description: Derived engagement tier from last-active recency + streak.
          properties:
            status:
              type: string
              enum: [healthy, active, at_risk, inactive]
            label:
              type: string
            tone:
              type: string
              enum: [success, neutral, warning, danger]
        last_active:
          type: string
          nullable: true
          readOnly: true
        last_login_at:
          type: string
          format: date-time
          readOnly: true
        last_login_ip:
          type: string
          readOnly: true
        profile_overview:
          type: object
          additionalProperties: {}
          readOnly: true
        exam_access_status:
          type: string
          readOnly: true
        exam_access_message:
          type: string
          nullable: true
          readOnly: true
        exam_summary:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        curriculum_progress:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        exam_history:
          type: array
          readOnly: true
          description: Last 10 exam attempts with proctoring/disqualification data.
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              exam_title:
                type: string
              score:
                type: string
                nullable: true
              total_marks:
                type: integer
              is_passed:
                type: boolean
                nullable: true
              started_at:
                type: string
                format: date-time
              submitted_at:
                type: string
                format: date-time
                nullable: true
              attempt_number:
                type: integer
              status:
                type: string
                enum: [in_progress, submitted, timed_out]
              auto_submitted:
                type: boolean
                description: True when status is `timed_out`.
              is_disqualified:
                type: boolean
              violations_count:
                type: integer
              duration_seconds:
                type: integer
                nullable: true
        proctoring_summary:
          type: object
          readOnly: true
          description: Aggregate proctoring stats across all the student's attempts.
          properties:
            total_violations:
              type: integer
            suspicious_flag:
              type: boolean
              description: True if any attempt was disqualified or total_violations >= 3.
