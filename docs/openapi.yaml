      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    TransactionStatusEnum:
      enum:
      - pending
      - success
      - failed
      - refunded
      type: string
      description: |-
        * `pending` - Pending
        * `success` - Success
        * `failed` - Failed
        * `refunded` - Refunded
    UnreadCountResponse:
      type: object
      properties:
        unread_count:
          type: integer
      required:
      - unread_count
    UpdateProgressRequest:
      type: object
      properties:
        watched_seconds:
          type: integer
          minimum: 0
      required:
      - watched_seconds
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        full_name:
          type: string
          readOnly: true
        phone:
          type: string
          readOnly: true
          nullable: true
        profile_picture:
          type: string
          format: uri
          readOnly: true
        is_student:
          type: boolean
          readOnly: true
        is_admin:
          type: boolean
          readOnly: true
      required:
      - email
      - full_name
      - id
      - is_admin
      - is_student
      - phone
      - profile_picture
    UserPreference:
      type: object
      properties:
        push_notifications:
          type: boolean
        email_notifications:
          type: boolean
        doubt_reply_notifications:
          type: boolean
        exam_result_notifications:
          type: boolean
        promotional_notifications:
          type: boolean
        payment_notifications:
          type: boolean
        issue_report_notifications:
          type: boolean
        feedback_reminder_notifications:
          type: boolean
    VerifyOTPRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        otp:
          type: string
          minLength: 6
          maxLength: 6
        purpose:
          allOf:
          - $ref: '#/components/schemas/PurposeEnum'
          default: verify
      required:
      - email
      - otp
    VerifyOTPResponse:
      type: object
      properties:
        detail:
          type: string
        verified:
          type: boolean
      required:
      - detail
      - verified
    VerifyPaymentRequest:
      type: object
      properties:
        razorpay_order_id:
          type: string
          minLength: 1
        razorpay_payment_id:
          type: string
          minLength: 1
        razorpay_signature:
          type: string
          minLength: 1
      required:
      - razorpay_order_id
      - razorpay_payment_id
      - razorpay_signature
    ViolationTypeEnum:
      enum:
      - full_screen_exit
      - tab_switch
      - voice_detected
      - multi_face
      - no_face
      - extension_detected
      type: string
      description: |-
        * `full_screen_exit` - Full Screen Exit
        * `tab_switch` - Tab Switch
        * `voice_detected` - Voice Detected
        * `multi_face` - Multiple Faces Detected
        * `no_face` - No Face Detected
        * `extension_detected` - Extension Detected
    Week:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        course:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - created_at
      - id
      - name
      - order
    WeekRequest:
      type: object
      properties:
        course:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_active:
          type: boolean
      required:
      - course
      - name
      - order
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
