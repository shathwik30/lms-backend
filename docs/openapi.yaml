          type: string
          format: uuid
        required: true
      tags:
      - Progress
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseProgress'
          description: ''
  /api/v1/progress/levels/{level_pk}/sessions/:
    get:
      operationId: progress_levels_sessions_list
      parameters:
      - in: path
        name: level_pk
        schema:
          type: string
          format: uuid
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - progress
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSessionProgressList'
          description: ''
  /api/v1/progress/sessions/{session_pk}/:
    post:
      operationId: progress_sessions_create
      parameters:
      - in: path
        name: session_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Progress
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionProgress'
          description: ''
  /api/v1/search/:
    get:
      operationId: search_retrieve
      parameters:
      - in: query
        name: level
        schema:
          type: integer
        description: Filter by level ID
      - in: query
        name: q
        schema:
          type: string
        description: Search query
        required: true
      - in: query
        name: week
        schema:
          type: integer
        description: Filter by week ID
      tags:
      - Search
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
          description: ''
