          description: ''
  /api/v1/auth/admin/issues/:
    get:
      operationId: auth_admin_issues_list
      parameters:
      - in: query
        name: category
        schema:
          type: string
          enum:
          - account
          - bug
          - content
          - other
          - payment
        description: |-
          * `bug` - Bug
          * `content` - Content Issue
          * `payment` - Payment Issue
          * `account` - Account Issue
          * `other` - Other
      - in: query
        name: is_resolved
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminIssueReportList'
          description: ''
  /api/v1/auth/admin/issues/{id}/:
    get:
      operationId: auth_admin_issues_retrieve
      summary: Get an issue report (admin)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Admin - Users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIssueReport'
          description: ''
    patch:
      operationId: auth_admin_issues_partial_update
      summary: Update an issue report (admin)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Admin - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminIssueReportRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminIssueReportRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminIssueReportRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIssueReport'
          description: ''
  /api/v1/auth/admin/students/:
    get:
      operationId: auth_admin_students_list
      parameters:
      - in: query
        name: account_status
        schema:
          type: string
          enum:
          - active
          - blocked
          - inactive
        description: |-
          * `active` - Active
          * `inactive` - Inactive
          * `blocked` - Blocked
      - in: query
        name: current_level
        schema:
          type: number
      - in: query
        name: highest_cleared_level
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: validity
        schema:
          type: string
          enum:
          - active
          - expired
          - none
        description: |-
          * `active` - Active
          * `expired` - Expired
          * `none` - No Purchase
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminStudentListList'
          description: ''
  /api/v1/auth/admin/students/{id}/:
