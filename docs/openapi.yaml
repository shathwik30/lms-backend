                description:
                  type: string
                category:
                  type: string
                is_resolved:
                  type: boolean
                admin_response:
                  type: string
                created_at:
                  type: string
                  format: date-time
                updated_at:
                  type: string
                  format: date-time
        payment_history:
          type: array
