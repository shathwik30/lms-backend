              payment_method:
                type: string
                nullable: true
              payment_gateway:
                type: string
              extended_by_days:
                type: integer
              is_valid:
                type: boolean
        admin_action_history:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
