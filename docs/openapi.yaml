openapi: 3.0.3
info:
  title: LMS API
  version: 1.0.0
  description: IIT/JEE Preparation LMS — level-based course progression with exams,
    payments, and analytics.
paths:
  /api/v1/analytics/dashboard/:
    get:
      operationId: analytics_dashboard_retrieve
      description: Aggregated admin dashboard stats endpoint.
      summary: Admin dashboard stats
      tags:
      - Analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
          description: ''
  /api/v1/analytics/levels/:
    get:
      operationId: analytics_levels_list
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: date
        schema:
          type: string
          format: date
      - in: query
        name: level
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLevelAnalyticsList'
          description: ''
  /api/v1/analytics/levels/{level_pk}/detail/:
    get:
      operationId: analytics_levels_detail_retrieve
      description: Detailed analytics for a single level.
      summary: Level analytics detail
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          default: 30
      - in: path
        name: level_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLevelAnalyticsDetailResponse'
          description: ''
  /api/v1/analytics/revenue/:
    get:
      operationId: analytics_revenue_list
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: date
        schema:
          type: string
          format: date
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
