name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (lint)
        run: ruff check apps/ core/ config/

      - name: Ruff format check
        run: ruff format --check apps/ core/ config/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run bandit (full report)
        run: bandit -r apps/ core/ -x "*/tests/*" --severity-level medium --confidence-level medium -f json -o bandit-report.json || true

      - name: Run bandit (fail on high severity)
        run: bandit -r apps/ core/ -x "*/tests/*" --severity-level high --confidence-level high

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  test:
    runs-on: ubuntu-latest
    needs: [lint, security]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_lms_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_lms_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      DJANGO_ENV: development
      DATABASE_URL: postgres://test_user:test_pass@localhost:5432/test_lms_db
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt coverage

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          coverage run --source=apps,core manage.py test --verbosity=2
          coverage report --fail-under=80
          coverage xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  schema:
    runs-on: ubuntu-latest
    needs: [lint]

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      DJANGO_ENV: development
      DATABASE_URL: sqlite:///db.sqlite3
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Validate OpenAPI schema
        run: python manage.py spectacular --validate --fail-on-warn
